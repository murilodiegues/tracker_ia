async function jbGet() {
  try {
    const url = SCRIPT_URL + '?token=' + encodeURIComponent(TOKEN) + '&t=' + Date.now();
    const r   = await fetch(url, { method: 'GET', redirect: 'follow' });
    if (!r.ok) { console.error('[GAS] GET', r.status); return null; }
    const txt = await r.text();
    if (!txt || txt.trim() === '' || txt.trim() === '{}') return null;
    const d = JSON.parse(txt);
    if (d && Array.isArray(d.sprints) && d.sprints.length) return d;
    return null;
  } catch(e) { console.error('[GAS] GET error:', e.message); return null; }
}


async function jbPut(payload) {
  const CHUNK  = 45000;
  const full   = JSON.stringify(payload);
  const chunk1 = full.slice(0, CHUNK);
  const chunk2 = full.slice(CHUNK);
  console.log('[GAS] POST FormData', Math.round(full.length/1024) + 'KB');

  // Use FormData — simple multipart request, bypasses CORS preflight with no-cors
  // GAS reads fields via e.parameter.chunk1, e.parameter.chunk2, e.parameter.token
  const form = new FormData();
  form.append('token',  TOKEN);
  form.append('chunk1', chunk1);
  form.append('chunk2', chunk2);

  try {
    await fetch(SCRIPT_URL, { method: 'POST', body: form, mode: 'no-cors' });
    console.log('[GAS] POST sent');
    return true;
  } catch(e) {
    console.error('[GAS] POST error:', e);
    showError('Falha de rede: ' + e.message);
    return false;
  }
}


function parseRec(rec) {
  if (!rec) return null;
  if (Array.isArray(rec) && rec.length) return { sprints: rec, enablers: [], savedAt: null };
  if (rec.sprints && rec.sprints.length) return {
    sprints:  rec.sprints,
    enablers: rec.enablers || [],
    savedAt:  rec._savedAt || null
  };
  return null;
}

async function save() {
  clearTimeout(saveT); saveT = null;

  // GET server first (merge concurrent additions)
  const rec = await jbGet();
  const srv = parseRec(rec);

  // Local wins for existing IDs; add server-only items
  const ms = [...sprints];
  const me = [...enablers];
  if (srv) {
    for (const ss of srv.sprints)  { if (!ms.find(x=>x.id===ss.id)) ms.push(ss); }
    for (const se of srv.enablers) { if (!me.find(x=>x.id===se.id)) me.push(se); }
  }
  sprints  = ms;
  enablers = me;

  const now = new Date().toISOString();
  const ok  = await jbPut({ sprints, enablers, _savedAt: now });

  if (ok) {
    lastServerSavedAt = now;
    showSaved();
    renderSidebar();
  } else {
    // showError already called inside jbPut
  }
}

async function load() {
  // 1. Show seed immediately
  sprints  = defaults();
  enablers = defaultEnablers();
  renderSidebar();
  renderMain();

  // 2. Fetch server and replace
  const rec = await jbGet();
  const srv = parseRec(rec);
  if (srv) {
    sprints  = srv.sprints;
    enablers = srv.enablers.length ? srv.enablers : defaultEnablers();
    lastServerSavedAt = srv.savedAt;
    renderSidebar();
    renderMain();
  }
}

// ── Test connection (called from sidebar button) ──
async function testSave() {
  const btn = document.getElementById('test-save-btn');
  if (btn) { btn.textContent = 'Testando...'; btn.disabled = true; }
  // write a tiny marker
  const marker = { _test: true, _t: Date.now(), sprints: sprints.slice(0,1).map(s=>({id:s.id,title:s.title})), enablers: [], _savedAt: new Date().toISOString(), token: TOKEN };
  const body = JSON.stringify(marker);
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body,
      mode: 'no-cors'
    });
    // no-cors: can't read response, wait then verify with GET
    await new Promise(res => setTimeout(res, 2000));
    // read back
    const rr = await fetch(SCRIPT_URL + '?token=' + TOKEN, { redirect: 'follow' });
    const tr = await rr.json();
    if (tr.record && tr.record._test) {
      alert('Round-trip OK!\nEscrita e leitura funcionando.\nAgora restaurando dados reais...');
      // restore real data
      await save();
    } else {
      alert('PROBLEMA: escrita retornou 200 mas leitura nao refletiu o dado.\n' + JSON.stringify(tr).slice(0,200));
    }
  } catch(e) {
    alert('Erro de rede: ' + e.message);
  }
  if (btn) { btn.textContent = '🔬 Testar Save'; btn.disabled = false; }
}

async function testConnection() {
  const btn = document.getElementById('test-conn-btn');
  if (btn) { btn.textContent = 'Testando...'; btn.disabled = true; }
  const rec = await jbGet();
  if (btn) { btn.textContent = '⚡ Testar Conexão'; btn.disabled = false; }
  if (rec && rec.sprints) {
    alert('Conexao OK — ' + rec.sprints.length + ' sprints, salvo em ' + (rec._savedAt||'?'));
  } else {
    alert('Falha ao conectar ao Apps Script.\nVerifique o console (F12).\nURL: ' + SCRIPT_URL.slice(0,60) + '...');
  }
}

// ── AUTO-REFRESH (poll every 30s for changes from other users) ──
let lastServerSavedAt = null;
let refreshPaused = false;

async function pollRemote() {
  if (refreshPaused || editing || saveT) return;
  const rec = await jbGet();
  const srv = parseRec(rec);
  if (!srv) return;
  if (srv.savedAt && srv.savedAt === lastServerSavedAt) return; // no change
  lastServerSavedAt = srv.savedAt;
  sprints    = srv.sprints;
  enablers   = srv.enablers.length ? srv.enablers : enablers;
  _snapshots = srv.snapshots;
  renderSidebar();
  if (!editing) renderMain();
  showRefreshBadge();
}

let rbT;
function showRefreshBadge() {
  const el = document.getElementById('si');
  el.textContent = '↻ Atualizado'; el.style.color = 'var(--ok)';
  el.classList.add('show'); clearTimeout(rbT);
  rbT = setTimeout(() => { el.classList.remove('show'); el.textContent = 'Salvo ✓'; }, 2500);
}

setInterval(pollRemote, 30000);
document.addEventListener('focusin',  () => { refreshPaused = true; });
document.addEventListener('focusout', () => { setTimeout(() => { refreshPaused = false; }, 2000); });

// ══════════════════════════════════════
// PEOPLE PICKER
// ══════════════════════════════════════
let ppSelected = {}; // { sprintId: [name, ...] }
let ppOpen = null;

function initPP(sprintId, selected) {
  ppSelected[sprintId] = [...(selected||[])];
}

function renderChips(selected, sprintId) {
  if (!selected.length) return `<span class="pp-placeholder">Selecionar responsáveis...</span>`;
  return selected.map(n=>`<span class="selected-chip">${esc(shortName(n))}<span class="rm" onclick="removePerson('${sprintId}','${esc(n)}',event)">×</span></span>`).join('');
}

function renderPPOptions(selected, sprintId, filter='') {
  return PEOPLE.filter(p=>!filter||p.toLowerCase().includes(filter.toLowerCase())).map(p=>{
    const sel = (ppSelected[sprintId]||[]).includes(p);
    return `<div class="pp-option ${sel?'selected':''}" onclick="togglePerson('${sprintId}','${esc(p)}')">
      <div class="pp-check">${sel?'✓':''}</div>
      <span>${esc(p)}</span>
    </div>`;
  }).join('');
}

function togglePP(sprintId) {
  const dd = document.getElementById('pp-dd-'+sprintId);
  const trigger = document.getElementById('pp-trigger-'+sprintId);
  if (dd.style.display==='none') {
    if (ppOpen && ppOpen!==sprintId) {
      document.getElementById('pp-dd-'+ppOpen).style.display='none';
      document.getElementById('pp-trigger-'+ppOpen).classList.remove('open');
    }
    dd.style.display='block'; trigger.classList.add('open'); ppOpen=sprintId;
    setTimeout(()=>{ const si=document.getElementById('pp-search-'+sprintId); if(si)si.focus(); },50);
  } else {
    dd.style.display='none'; trigger.classList.remove('open'); ppOpen=null;
  }
}

function filterPP(sprintId, val) {
  document.getElementById('pp-opts-'+sprintId).innerHTML = renderPPOptions(ppSelected[sprintId]||[], sprintId, val);
}

function togglePerson(sprintId, name) {
  if (!ppSelected[sprintId]) ppSelected[sprintId]=[];
  const idx = ppSelected[sprintId].indexOf(name);
  if (idx>=0) ppSelected[sprintId].splice(idx,1);
  else ppSelected[sprintId].push(name);
  document.getElementById('pp-chips-'+sprintId).innerHTML = renderChips(ppSelected[sprintId], sprintId);
  document.getElementById('pp-opts-'+sprintId).innerHTML = renderPPOptions(ppSelected[sprintId], sprintId, document.getElementById('pp-search-'+sprintId)?.value||'');
}

function removePerson(sprintId, name, e) {
  e.stopPropagation();
  if (!ppSelected[sprintId]) return;
  ppSelected[sprintId] = ppSelected[sprintId].filter(n=>n!==name);
  document.getElementById('pp-chips-'+sprintId).innerHTML = renderChips(ppSelected[sprintId], sprintId);
}

document.addEventListener('click', e => {
  if (ppOpen && !e.target.closest('.people-picker')) {
    const dd = document.getElementById('pp-dd-'+ppOpen);
    const tr = document.getElementById('pp-trigger-'+ppOpen);
    if (dd) dd.style.display='none';
    if (tr) tr.classList.remove('open');
    ppOpen=null;
  }
});

// ══════════════════════════════════════
// EDIT ACTIONS
// ══════════════════════════════════════
function startEdit(id) {
  editing=true;
  const s=sprints.find(x=>x.id===id); if(!s)return;
  initPP(id, s.resp||[]);
  renderMain();
}
function cancelEdit(){ editing=false; ppOpen=null; renderMain(); }
function pickColor(c,el){ document.getElementById('cpicker').dataset.sel=c; document.querySelectorAll('#cpicker .cdot').forEach(d=>d.classList.remove('sel')); el.classList.add('sel'); }

function saveEdit(id) {
  const s=sprints.find(x=>x.id===id); if(!s)return;
  s.area = document.getElementById('e-area').value.trim();
  s.title = document.getElementById('e-title').value.trim();
  s.color = document.getElementById('cpicker').dataset.sel;
  s.prob = document.getElementById('e-prob').value.trim();
  s.mvp = document.getElementById('e-mvp').value.trim();
  s.time = document.getElementById('e-time').value.trim();
  s.complex = document.getElementById('e-complex').value.trim();
  s.impact = document.getElementById('e-impact').value.trim();
  s.deadline = document.getElementById('e-deadline').value;
  s.areas = document.getElementById('e-areas').value.trim();
  s.resp = ppSelected[id]||[];
  // steps
  document.querySelectorAll('[data-step]').forEach(el=>{
    const st=s.steps.find(x=>x.id===el.dataset.step); if(st)st[el.dataset.f]=el.value;
  });
  // criteria
  s.criteria = Array.from(document.querySelectorAll('[data-crit]')).map(el=>{
    const existing = (s.criteria||[]).find(c=>c.id===el.dataset.crit);
    return { id:el.dataset.crit, text:el.value.trim(), done:existing?existing.done:false };
  }).filter(c=>c.text);
  // blocks
  s.blocks = Array.from(document.querySelectorAll('[data-bl]')).map(el=>el.value.trim()).filter(Boolean);
  editing=false; ppOpen=null; qsave(); renderSidebar(); renderMain();
}

function addStep(sprintId) {
  const s=sprints.find(x=>x.id===sprintId); if(!s)return;
  const step={id:pid(),action:'Novo passo',detail:'Descreva o que acontece neste passo...',tools:'',done:false};
  s.steps.push(step);
  const c=document.getElementById('steps-c'); if(!c)return;
  const i=s.steps.length-1;
  const div=document.createElement('div');
  div.innerHTML=`<div class="e-step" id="es-${step.id}">
    <div class="e-step-h"><span class="e-step-n">Passo ${i+1}</span><button class="sbtn del" onclick="rmStep('${sprintId}','${step.id}')">✕ Remover</button></div>
    <div class="field" style="margin-bottom:9px"><label class="fl-lbl">Ação</label><input class="fi" data-step="${step.id}" data-f="action" value="${esc(step.action)}"></div>
    <div class="field" style="margin-bottom:9px"><label class="fl-lbl">Detalhe</label><textarea class="fi fi-ta" data-step="${step.id}" data-f="detail">${esc(step.detail)}</textarea></div>
    <div class="field" style="margin-bottom:0"><label class="fl-lbl">Ferramentas / Plataformas (separadas por vírgula)</label><input class="fi" data-step="${step.id}" data-f="tools" value=""></div>
  </div>`;
  c.appendChild(div.firstElementChild);
}

function rmStep(sprintId,stepId) {
  const s=sprints.find(x=>x.id===sprintId); if(!s)return;
  s.steps=s.steps.filter(x=>x.id!==stepId);
  const el=document.getElementById('es-'+stepId); if(el)el.remove();
  document.querySelectorAll('#steps-c .e-step-n').forEach((el,i)=>{el.textContent=`Passo ${i+1}`;});
}

function addCrit(sprintId) {
  const c=document.getElementById('crit-c-'+sprintId); if(!c)return;
  const newId=cid();
  const div=document.createElement('div');
  div.className='crit-edit-row'; div.id=`cr-${newId}`;
  div.innerHTML=`<input class="fi" data-crit="${newId}" value="" placeholder="Ex: 10 criativos prontos em produção">
    <button class="del-btn" onclick="rmCritEl('${newId}')">✕</button>`;
  c.appendChild(div);
}

function rmCrit(sprintId, critId) {
  const el=document.getElementById('cr-'+critId); if(el)el.remove();
}
function rmCritEl(critId) {
  const el=document.getElementById('cr-'+critId); if(el)el.remove();
}

function addBlock() {
  const c=document.getElementById('blocks-c'); if(!c)return;
  const idx=c.querySelectorAll('[data-bl]').length;
  const div=document.createElement('div');
  div.className='b-row'; div.id=`bl-${idx}`;
  div.innerHTML=`<textarea class="fi fi-ta" data-bl="${idx}" style="min-height:42px" placeholder="Descreva o gargalo ou risco..."></textarea><button class="del-btn" onclick="this.parentElement.remove()">✕</button>`;
  c.appendChild(div);
}

// ══════════════════════════════════════
// TOGGLES
// ══════════════════════════════════════
function toggleStep(spId,stId){ const s=sprints.find(x=>x.id===spId); if(!s)return; const st=s.steps.find(x=>x.id===stId); if(!st)return; st.done=!st.done; qsave(); renderSidebar(); renderMain(); }
function toggleCrit(spId,crId){ const s=sprints.find(x=>x.id===spId); if(!s)return; const cr=(s.criteria||[]).find(x=>x.id===crId); if(!cr)return; cr.done=!cr.done; qsave(); renderSidebar(); renderMain(); }
function toggleDone(id){ const s=sprints.find(x=>x.id===id); if(!s)return; s.done=!s.done; qsave(); renderSidebar(); renderMain(); }
function delSprint(id){ if(!confirm('Excluir esta sprint permanentemente?'))return; sprints=sprints.filter(s=>s.id!==id); curPage='overview'; qsave(); renderSidebar(); renderMain(); }

// ══════════════════════════════════════
function openAddModal() {
  const initColor = COLORS[Math.floor(Math.random()*COLORS.length)];
  const dots = COLORS.map(c=>`<div class="cdot ${c===initColor?'sel':''}" style="background:${c}" onclick="this.parentElement.dataset.sel='${c}';this.parentElement.querySelectorAll('.cdot').forEach(d=>d.classList.remove('sel'));this.classList.add('sel')"></div>`).join('');
  document.getElementById('mb').innerHTML=`
    <div class="mh">+ Nova Sprint</div>
    <div class="field"><label class="fl-lbl">Título da Sprint *</label><input class="fi" id="ns-title" placeholder="Ex: Automação de E-mail Marketing"></div>
    <div class="field"><label class="fl-lbl">Tag / Área</label><input class="fi" id="ns-area" placeholder="Ex: Sprint 8 · Marketing / CRM"></div>
    <div class="field"><label class="fl-lbl">Cor</label><div class="cpicker" id="ns-cp" data-sel="${initColor}">${dots}</div></div>
    <div class="field"><label class="fl-lbl">Problema</label><textarea class="fi fi-ta" id="ns-prob" placeholder="Descreva o problema atual que esta sprint resolve..."></textarea></div>
    <div class="field"><label class="fl-lbl">Hipótese de MVP</label><textarea class="fi fi-ta" id="ns-mvp" placeholder="Qual é a menor entrega que gera valor e prova o conceito?"></textarea></div>
    <div class="f-row">
      <div class="field" style="margin-bottom:0"><label class="fl-lbl">Prazo estimado</label><input class="fi" id="ns-time" placeholder="Ex: 3–4 semanas"></div>
      <div class="field" style="margin-bottom:0"><label class="fl-lbl">Complexidade</label><input class="fi" id="ns-complex" placeholder="Ex: Média"></div>
    </div>
    <div class="f-row" style="margin-top:11px">
      <div class="field" style="margin-bottom:0"><label class="fl-lbl">Impacto</label><input class="fi" id="ns-impact" placeholder="Ex: Alto"></div>
      <div class="field" style="margin-bottom:0"><label class="fl-lbl">Prazo (data)</label><input class="fi" id="ns-deadline" type="date"></div>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-save" onclick="createSprint()">Criar Sprint</button>
    </div>`;
  document.getElementById('ovm').classList.add('open');
}

function closeModal(){ document.getElementById('ovm').classList.remove('open'); }

function createSprint() {
  const title=document.getElementById('ns-title').value.trim();
  if(!title){alert('O título é obrigatório.');return;}
  const n=sprints.length+1;
  const s={
    id:uid(), color:document.getElementById('ns-cp').dataset.sel||COLORS[0],
    area:document.getElementById('ns-area').value.trim()||`Sprint ${n}`,
    title, prob:document.getElementById('ns-prob').value.trim(),
    mvp:document.getElementById('ns-mvp').value.trim(),
    time:document.getElementById('ns-time').value.trim()||'—',
    complex:document.getElementById('ns-complex').value.trim()||'—',
    impact:document.getElementById('ns-impact').value.trim()||'—',
    deadline:document.getElementById('ns-deadline').value,
    resp:[], done:false,
    criteria:[],
    steps:[{id:pid(),action:'Primeiro passo',detail:'Descreva o que acontece neste passo...',tools:'',done:false}],
    areas:'', blocks:[]
  };
  sprints.push(s); curPage=s.id; editing=true;
  initPP(s.id,[]);
  closeModal(); save().then(()=>{ if(!editing) renderMain(); }); renderSidebar(); renderMain();
}

document.getElementById('ovm').addEventListener('click',e=>{if(e.target===document.getElementById('ovm'))closeModal();});

// TRANSVERSAL — FULL CRUD
// ══════════════════════════════════════
function renderTransversal() {
  const done = enablers.filter(e=>e.done).length;
  const total = enablers.length;

  const cards = enablers.map((e,i) => {
    const steps = e.steps||[];

    const stepsH = steps.length ? `<div class="en-steps">
      ${steps.map((s,si)=>`
        <div class="en-step-row ${s.done?'sdone':''}" onclick="toggleEnStep('${e.id}','${s.id}')">
          <span class="en-snum">${s.done?'✓':si+1}</span>
          <span class="en-stext">${esc(s.text)}</span>
          <span class="en-scheck">${s.done?'✓':'○'}</span>
        </div>`).join('')}

    const respH = resp.length
      ? resp.map(r=>`<span class="en-chip">${esc(shortName(r))}</span>`).join('')

    const progH = steps.length ? `<span style="font-family:'DM Mono',monospace;font-size:10px;color:${sDone===steps.length?'var(--ok)':'var(--muted)'};">${sDone}/${steps.length} passos</span>` : '';

    return `<div class="en-card ${e.done?'en-done':''}">

      <div class="en-card-footer">
        <div class="en-resp">${respH}</div>
        <div style="display:flex;align-items:center;gap:8px">
          ${progH}
          <div class="en-actions">
            <button class="en-btn ok ${e.done?'on':''}" onclick="toggleEnDone('${e.id}')">${e.done?'✓ Pronto':'Marcar Pronto'}</button>

        </div>

  }).join('');

  const summaryH = `<div style="display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 18px;display:flex;flex-direction:column;gap:3px">

    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 18px;display:flex;flex-direction:column;gap:3px">
      <span style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)">Prontos</span>
      <span style="font-size:22px;font-weight:700;color:var(--ok)">${done} <span style="font-size:14px;color:var(--muted)">/ ${total}</span></span>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 18px;display:flex;flex-direction:column;gap:3px">
      <span style="font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)">Em andamento</span>
      <span style="font-size:22px;font-weight:700;color:var(--accent)">${enablers.filter(e=>!e.done&&(e.steps||[]).some(s=>s.done)).length}</span>
    </div>
  </div>`;

  return `<div class="ph">
    <div class="ha">
      <button class="btn btn-save" onclick="openEnModal(null)">+ Novo Habilitador</button>
    </div>
    <div class="pt" style="background:rgba(192,132,252,.12);color:#c084fc">Entregas Transversais</div>
    <div class="ptitle">Habilitadores para todas as Sprints</div>
    <div class="pprob">Pré-requisitos críticos que desbloqueiam múltiplas sprints. Clique em ✎ para editar ou adicionar responsáveis e passo a passo de cada habilitador.</div>
  </div>
  <div class="pb">
    ${summaryH}
    <div class="sec">
      <div class="stitle">Habilitadores — clique nos passos para marcar conclusão</div>
      <div class="en-grid">${cards}</div>
      <button class="add-row-btn" onclick="openEnModal(null)">+ Novo Habilitador</button>
    </div>
    <div class="divider"></div>
    <div class="sec"><div class="stitle">Mentalidade de MVP</div>
    <div class="hl-box">💡 <strong>Não espere tudo pronto para começar.</strong> As transversais devem desbloquear sprints gradualmente. Um pipeline imperfeito que funciona vale mais que um sistema perfeito que nunca sai do papel.</div></div>
  </div>`;
}

// ── ENABLER MODAL ────────────────────
function openEnModal(id) {
  const e = id ? enablers.find(x=>x.id===id) : null;
  const isNew = !e;
  const steps = e ? (e.steps||[]) : [];
  const resp  = e ? (e.resp||[])  : [];
  const enId  = e ? e.id : uid();
  if (!id) ppSelected[enId] = [];
  else { ppSelected[enId] = [...resp]; initPP(enId, resp); }

  const iconsH = ENABLER_ICONS.map(ic=>`<div class="icon-opt ${(e&&e.icon===ic)?'sel':''}" onclick="pickEnIcon('${ic}',this)">${ic}</div>`).join('');

  const stepsH = steps.map((s,i)=>`
    <div class="en-edit-step" id="ens-${s.id}">
      <div class="en-edit-step-h">
        <span class="e-step-n">Passo ${i+1}</span>
        <button class="sbtn del" onclick="document.getElementById('ens-${s.id}').remove()">✕ Remover</button>
      </div>
      <input class="fi" data-enstep="${s.id}" value="${esc(s.text)}" placeholder="Descreva este passo...">
    </div>`).join('');

  document.getElementById('mb').innerHTML = `
    <div class="mh">${isNew ? '+ Novo Habilitador' : '✎ Editar Habilitador'}</div>
    <div class="field"><label class="fl-lbl">Ícone</label>
      <div class="icon-picker" id="en-icon-picker" data-sel="${e?e.icon:'📋'}">${iconsH}</div>
    </div>
    <div class="field"><label class="fl-lbl">Nome *</label>
      <input class="fi" id="en-name" value="${esc(e?e.name:'')}" placeholder="Ex: Banco de Imagens com Design System">
    </div>
    <div class="field"><label class="fl-lbl">Descrição</label>
      <textarea class="fi fi-ta" id="en-desc" placeholder="Descreva o que é, por que importa e quais sprints habilita...">${esc(e?e.desc:'')}</textarea>
    </div>
    <div class="field"><label class="fl-lbl">Responsáveis</label>
      <div class="people-picker" id="pp-${enId}">
        <div class="pp-trigger" id="pp-trigger-${enId}" onclick="togglePP('${enId}')">
          <div id="pp-chips-${enId}" style="display:flex;flex-wrap:wrap;gap:4px;flex:1">${renderChips(ppSelected[enId]||[], enId)}</div>
          <span class="pp-arrow">▾</span>
        </div>
        <div class="pp-dropdown" id="pp-dd-${enId}" style="display:none">
          <div class="pp-search"><input type="text" placeholder="Buscar..." oninput="filterPP('${enId}',this.value)" id="pp-search-${enId}"></div>
          <div id="pp-opts-${enId}">${renderPPOptions(ppSelected[enId]||[], enId)}</div>
        </div>
      </div>
    </div>
    <div class="field"><label class="fl-lbl">Passo a Passo</label>
      <div id="en-steps-c">${stepsH}</div>
      <button class="add-row-btn" style="margin-top:4px" onclick="addEnStep()">+ Adicionar Passo</button>
    </div>
    <div class="mfoot">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-save" onclick="saveEnModal('${enId}',${isNew})">${isNew?'Criar':'Salvar'}</button>
    </div>`;

  document.getElementById('ovm').classList.add('open');
}

function pickEnIcon(ic, el) {
  document.getElementById('en-icon-picker').dataset.sel = ic;
  document.querySelectorAll('#en-icon-picker .icon-opt').forEach(d=>d.classList.remove('sel'));
  el.classList.add('sel');
}

function addEnStep() {
  const c = document.getElementById('en-steps-c'); if(!c) return;
  const sid = uid();
  const idx = c.querySelectorAll('.en-edit-step').length;
  const div = document.createElement('div');
  div.className = 'en-edit-step'; div.id = `ens-${sid}`;
  div.innerHTML = `
    <div class="en-edit-step-h">
      <span class="e-step-n">Passo ${idx+1}</span>
      <button class="sbtn del" onclick="document.getElementById('ens-${sid}').remove()">✕ Remover</button>
    </div>
    <input class="fi" data-enstep="${sid}" value="" placeholder="Descreva este passo...">`;
  c.appendChild(div);
}

function saveEnModal(enId, isNew) {
  const name = document.getElementById('en-name').value.trim();
  if (!name) { alert('O nome é obrigatório.'); return; }

  const steps = Array.from(document.querySelectorAll('[data-enstep]')).map(el=>({
    id: el.dataset.enstep,
    text: el.value.trim(),
    done: isNew ? false : ((enablers.find(x=>x.id===enId)||{steps:[]}).steps||[]).find(s=>s.id===el.dataset.enstep)?.done || false
  })).filter(s=>s.text);

  if (isNew) {
    enablers.push({
      id: enId,
      icon: document.getElementById('en-icon-picker').dataset.sel || '📋',
      name,
      desc: document.getElementById('en-desc').value.trim(),
      resp: ppSelected[enId]||[],
      steps,
      done: false
    });
  } else {
    const e = enablers.find(x=>x.id===enId); if(!e) return;
    e.icon  = document.getElementById('en-icon-picker').dataset.sel || e.icon;
    e.name  = name;
    e.desc  = document.getElementById('en-desc').value.trim();
    e.resp  = ppSelected[enId]||[];
    e.steps = steps;
  }
  closeModal(); qsave(); renderSidebar(); renderMain();
}

function toggleEnDone(id) {
  const e = enablers.find(x=>x.id===id); if(!e) return;
  e.done = !e.done; qsave(); renderSidebar(); renderMain();
}

function toggleEnStep(enId, stepId) {
  const e = enablers.find(x=>x.id===enId); if(!e) return;
  const s = (e.steps||[]).find(x=>x.id===stepId); if(!s) return;
  s.done = !s.done; qsave(); renderSidebar(); renderMain();
}

function deleteEnabler(id) {
  if (!confirm('Excluir este habilitador permanentemente?')) return;
  enablers = enablers.filter(e=>e.id!==id); qsave(); renderSidebar(); renderMain();
}

// ══════════════════════════════════════
// HISTORY MODAL
// ══════════════════════════════════════
let _snapshots = [];

async function openHistoryModal() {
  const msg = 'Historico nao disponivel via Apps Script. Use Arquivo > Historico de versoes na planilha Google.';
  document.getElementById('mb').innerHTML = '<div class="mh">&#8635; Hist&oacute;rico</div><div style="padding:20px;color:var(--muted);font-size:13px;text-align:center">' + msg + '</div><div class="mfoot"><button class="btn" onclick="closeModal()">Fechar</button></div>';
  document.getElementById('ovm').classList.add('open');
}
function renderHistoryModal() {
  if (!_snapshots.length) {
    document.getElementById('mb').innerHTML = `
      <div class="mh">↺ Histórico de Versões</div>
      <div style="padding:16px 0;color:var(--muted);font-size:13px;text-align:center">
        Nenhum snapshot disponível ainda.<br>
        <span style="font-size:12px">Os últimos 5 estados serão preservados automaticamente a partir do próximo save.</span>
      </div>
      <div class="mfoot"><button class="btn" onclick="closeModal()">Fechar</button></div>`;
    return;
  }

  const rows = _snapshots.map((snap, i) => {
    const dt = new Date(snap._savedAt);
    const dateStr = dt.toLocaleDateString('pt-BR', {day:'2-digit',month:'short',year:'numeric'});
    const timeStr = dt.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
    const sprintCount   = (snap.sprints||[]).length;
    const enablerCount  = (snap.enablers||[]).length;
    const doneCount     = (snap.sprints||[]).filter(s=>s.done).length;
    return `<div style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:14px 16px;margin-bottom:8px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">${dateStr} às ${timeStr}</div>
          <div style="font-size:12px;color:var(--muted)">${sprintCount} sprints · ${doneCount} concluídas · ${enablerCount} habilitadores</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">
            ${(snap.sprints||[]).map(s=>`<span style="font-size:10px;padding:1px 7px;background:${s.color}22;color:${s.color};border-radius:3px;font-family:'DM Mono',monospace">${esc(s.title.length>22?s.title.slice(0,22)+'…':s.title)}</span>`).join('')}
          </div>
        </div>
        <button class="btn" style="flex-shrink:0;color:var(--accent);border-color:rgba(240,192,64,.3)" onclick="restoreSnapshot(${i})">Restaurar esta versão</button>
      </div>
    </div>`;
  }).join('');

  document.getElementById('mb').innerHTML = `
    <div class="mh">↺ Histórico de Versões</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:16px">Últimas ${_snapshots.length} versão(ões) salvas automaticamente. Restaurar substitui o estado atual — uma cópia do estado atual é preservada como snapshot antes da restauração.</div>
    ${rows}
    <div class="mfoot"><button class="btn" onclick="closeModal()">Fechar</button></div>`;
}

async function restoreSnapshot(idx) {
  if (!confirm('Restaurar esta versão? O estado atual será preservado como snapshot.')) return;
  const snap = _snapshots[idx];
  if (!snap) return;
  sprints  = snap.sprints  || [];
  enablers = snap.enablers || [];
  closeModal();
  await save(); // this will snapshot current before overwriting
  renderSidebar();
  renderMain();
}
const SESSION_KEY = 'ia_sprints_auth';

// SHA-256 hash da senha correta (gerado offline — a senha em si nunca aparece no código)
const PASSWORD_HASH = 'e405ccd6225c328ad7944dc896ca0853575324ce60f68486ceaf9fdbf1eed9c9';

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function doLogin() {
  const val = document.getElementById('loginInput').value;
  const hash = await sha256(val);
  if (hash === PASSWORD_HASH) {
    TOKEN = val; // senha vira o token em runtime — nunca esteve hardcoded
    sessionStorage.setItem(SESSION_KEY, '1');
    sessionStorage.setItem(SESSION_KEY + '_t', val); // preserva para reload da aba
    document.getElementById('loginScreen').style.display = 'none';
    init();
  } else {
    const err = document.getElementById('loginErr');
    const box = document.getElementById('loginBox');
    err.textContent = 'Senha incorreta. Tente novamente.';
    box.classList.remove('login-shake');
    void box.offsetWidth;
    box.classList.add('login-shake');
    document.getElementById('loginInput').value = '';
    document.getElementById('loginInput').focus();
    setTimeout(() => { err.textContent = ''; }, 3000);
  }
}

function checkAuth() {
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    TOKEN = sessionStorage.getItem(SESSION_KEY + '_t') || '';
    document.getElementById('loginScreen').style.display = 'none';
    init();
  } else {
    setTimeout(() => document.getElementById('loginInput').focus(), 100);
  }
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
async function init() {
  await load(); // load() handles renderSidebar + renderMain internally
}

checkAuth();

</script>
