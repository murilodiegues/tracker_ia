<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow">
<meta name="bingbot" content="noindex, nofollow">
<title>IA Sprints — SL Mandic</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0f11;--surface:#161719;--surface2:#1c1e21;
  --border:#252628;--text:#e8e9ea;--muted:#6b6d72;
  --accent:#f0c040;--a2:#5b8fff;--a3:#6fda9e;--a4:#ff7c5b;--a5:#c084fc;
  --tag-bg:#1e2024;--sw:264px;--ok:#4ade80;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden;font-size:15px}

/* ── SIDEBAR ── */
.sb{width:var(--sw);min-width:var(--sw);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;z-index:10}
.sb-hdr{padding:22px 18px 14px;border-bottom:1px solid var(--border)}
.sb-logo{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.sb-title{font-size:14px;font-weight:700;line-height:1.3}
.sb-sec{padding:12px 10px 4px}
.sb-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:0 8px;margin-bottom:3px}
.ni{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:background .12s;margin-bottom:1px;user-select:none}
.ni:hover{background:var(--tag-bg)}
.ni.active{background:var(--tag-bg)}
.ni.active .nl{color:var(--text);font-weight:500}
.nd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nl{font-size:12px;color:var(--muted);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ni.completed .nl{text-decoration:line-through;opacity:.5}
.add-btn{margin:6px 10px 10px;display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;border:1px dashed var(--border);cursor:pointer;font-size:12px;color:var(--muted);background:transparent;transition:all .15s}
.add-btn:hover{border-color:var(--muted);background:var(--tag-bg);color:var(--text)}

/* ── MAIN ── */
.mn{flex:1;overflow-y:auto}

/* ── HERO ── */
.ph{padding:28px 40px 20px;border-bottom:1px solid var(--border);position:relative}
.ha{position:absolute;top:24px;right:36px;display:flex;gap:7px;align-items:center}
.btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.07em;text-transform:uppercase;padding:6px 13px;border-radius:5px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:transparent;color:var(--muted)}
.btn:hover{background:var(--tag-bg);color:var(--text)}
.btn-save{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-save:hover{opacity:.88}
.btn-del{color:var(--a4);border-color:rgba(255,124,91,.3)}
.btn-del:hover{background:rgba(255,124,91,.08)}
.btn-done{color:var(--ok);border-color:rgba(74,222,128,.3)}
.btn-done:hover,.btn-done.on{background:rgba(74,222,128,.1)}
.pt{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:11px;font-weight:500}
.ptitle{font-size:22px;font-weight:700;line-height:1.2;margin-bottom:7px}
.pprob{font-size:13px;color:var(--muted);max-width:660px;line-height:1.6}
.mr{display:flex;gap:18px;margin-top:13px;flex-wrap:wrap}
.mi{display:flex;flex-direction:column;gap:3px}
.ml{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.mv{font-size:13px;font-weight:500;color:var(--text)}
.rs{display:flex;gap:16px;flex-wrap:wrap;margin-top:13px;padding-top:13px;border-top:1px solid var(--border);align-items:center}
.rg{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.rl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.chip{font-size:11px;padding:3px 10px;background:var(--tag-bg);border:1px solid var(--border);border-radius:100px;color:var(--text)}
.done-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--ok);background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);padding:3px 10px;border-radius:100px}
.dl-over{color:var(--a4)}.dl-soon{color:var(--accent)}
.pbar{height:3px;background:var(--border);border-radius:10px;overflow:hidden;margin-top:12px;max-width:360px}
.pfill{height:100%;background:var(--ok);border-radius:10px;transition:width .3s}

/* ── BODY ── */
.pb{padding:24px 40px 60px}
.sec{margin-bottom:32px}
.stitle{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.mvp-box{background:var(--surface);border:1px solid var(--border);border-left-width:3px;border-radius:8px;padding:14px 18px;font-size:13px;line-height:1.7;color:var(--text)}

/* ── FLOW ── */
.flow{display:flex;flex-direction:column}
.fs{display:flex;gap:12px}
.fl{display:flex;flex-direction:column;align-items:center;width:27px;flex-shrink:0}
.sn{width:25px;height:25px;border-radius:50%;background:var(--tag-bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);flex-shrink:0;z-index:1;cursor:pointer;transition:all .15s;user-select:none}
.sn:hover{border-color:var(--muted)}.sn.done{background:rgba(74,222,128,.15);border-color:rgba(74,222,128,.4);color:var(--ok)}
.fline{width:1px;flex:1;background:var(--border);min-height:13px;margin:3px 0}
.fs:last-child .fline{display:none}
.fc{padding:1px 0 18px;flex:1;min-width:0}
.fa{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.3}
.fd{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:6px}
.ftags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-family:'DM Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;background:var(--tag-bg);border:1px solid var(--border);color:var(--muted)}
.tag.tool{color:var(--a2);border-color:rgba(91,143,255,.25)}
.tag.api{color:var(--a3);border-color:rgba(111,218,158,.25)}
.tag.warn{color:var(--a4);border-color:rgba(255,124,91,.25)}
.tag.ai{color:var(--accent);border-color:rgba(240,192,64,.25)}
.sdone .fa{text-decoration:line-through;opacity:.5}.sdone .fd,.sdone .ftags{opacity:.35}

/* ── CRITERIA ── */
.criteria-list{display:flex;flex-direction:column;gap:7px}
.crit-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:border-color .15s}
.crit-item:hover{border-color:var(--muted)}
.crit-item.crit-done{border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.04)}
.crit-check{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.crit-item.crit-done .crit-check{background:rgba(74,222,128,.2);border-color:rgba(74,222,128,.5);color:var(--ok)}
.crit-text{font-size:13px;color:var(--text);line-height:1.5;flex:1}
.crit-item.crit-done .crit-text{text-decoration:line-through;color:var(--muted)}
.crit-progress{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.crit-prog-label{font-size:12px;color:var(--muted)}
.crit-prog-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--ok)}

/* ── AREAS / BLOCKS ── */
.ag{display:flex;flex-wrap:wrap;gap:7px}
.ac{padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:100px;font-size:12px;color:var(--muted)}
.bl-list{display:flex;flex-direction:column;gap:7px}
.bl-item{display:flex;align-items:flex-start;gap:9px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:13px;line-height:1.5;color:var(--muted)}
.bl-item::before{content:"⚠";color:var(--a4);flex-shrink:0;margin-top:1px}

/* ── OVERVIEW ── */
.ov-h{padding:32px 40px 20px;border-bottom:1px solid var(--border)}
.ov-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.ov-h1{font-size:26px;font-weight:700;line-height:1.15;margin-bottom:8px}
.ov-sub{font-size:13px;color:var(--muted);max-width:540px;line-height:1.6}
.ov-stats{display:flex;gap:24px;margin-top:16px}
.stat{display:flex;flex-direction:column;gap:2px}
.stn{font-size:24px;font-weight:700}.stl{font-size:11px;color:var(--muted)}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:10px;padding:20px 40px 50px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:16px;cursor:pointer;transition:border-color .15s,transform .12s}
.sc:hover{border-color:var(--muted);transform:translateY(-1px)}
.sc.sc-done{border-color:rgba(74,222,128,.25)}
.sc-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.11em;text-transform:uppercase;padding:2px 7px;border-radius:3px;display:inline-block;margin-bottom:8px;font-weight:500}
.sc-title{font-size:14px;font-weight:600;margin-bottom:5px;line-height:1.3}
.sc-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.sc-foot{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.sc-badge{font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:var(--tag-bg);color:var(--muted);border:1px solid var(--border)}
.add-card{border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px;gap:6px}

/* ── MODAL ── */
.ov-modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s}
.ov-modal.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:11px;width:540px;max-width:94vw;max-height:86vh;overflow-y:auto;padding:24px 26px}
.mh{font-size:17px;font-weight:700;margin-bottom:16px}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ── FORMS ── */
.field{margin-bottom:13px}
.fl-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block}
.fi{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 11px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--muted)}
.fi-ta{min-height:62px;resize:vertical;line-height:1.55}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cpicker{display:flex;gap:7px;flex-wrap:wrap}
.cdot{width:21px;height:21px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s}
.cdot:hover{transform:scale(1.18)}.cdot.sel{border-color:white}

/* ── PEOPLE DROPDOWN ── */
.people-picker{position:relative}
.pp-trigger{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 11px;color:var(--text);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:border-color .15s;min-height:38px;flex-wrap:wrap;gap:4px}
.pp-trigger:hover{border-color:var(--muted)}
.pp-trigger.open{border-color:var(--muted)}
.pp-arrow{color:var(--muted);font-size:10px;flex-shrink:0;margin-left:4px}
.pp-placeholder{color:var(--muted);font-size:13px}
.pp-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:7px;z-index:200;max-height:220px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.pp-search{padding:8px 10px;border-bottom:1px solid var(--border)}
.pp-search input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:6px 9px;color:var(--text);font-size:12px;outline:none;font-family:'DM Sans',sans-serif}
.pp-option{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;transition:background .12s;font-size:13px}
.pp-option:hover{background:var(--tag-bg)}
.pp-option.selected{color:var(--ok)}
.pp-check{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;transition:all .12s}
.pp-option.selected .pp-check{background:rgba(74,222,128,.2);border-color:rgba(74,222,128,.5);color:var(--ok)}
.selected-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;background:var(--tag-bg);border:1px solid var(--border);border-radius:100px;color:var(--text)}
.selected-chip .rm{cursor:pointer;color:var(--muted);font-size:12px;line-height:1}
.selected-chip .rm:hover{color:var(--a4)}

/* ── EDIT SECTIONS ── */
.es{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px}
.es-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.e-step{background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:9px}
.e-step-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.e-step-n{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.sbtn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;transition:all .12s}
.sbtn:hover{background:var(--tag-bg);color:var(--text)}
.sbtn.del:hover{color:var(--a4);border-color:rgba(255,124,91,.3)}
.add-row-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);border:1px dashed var(--border);border-radius:5px;padding:6px 11px;cursor:pointer;background:transparent;transition:all .12s;font-family:'DM Sans',sans-serif}
.add-row-btn:hover{border-color:var(--muted);color:var(--text);background:var(--tag-bg)}
.b-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.crit-edit-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px}
.del-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 4px;line-height:1;transition:color .12s;flex-shrink:0;margin-top:7px}
.del-btn:hover{color:var(--a4)}
.edit-bar{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase;margin-bottom:11px}

/* ── TRANSVERSAL ── */
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.tc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 15px}
.t-icon{font-size:18px;margin-bottom:6px}.t-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:5px}.t-desc{font-size:12px;color:var(--muted);line-height:1.5}
.hl-box{background:rgba(240,192,64,.06);border:1px solid rgba(240,192,64,.2);border-radius:7px;padding:12px 16px;font-size:13px;color:var(--text);line-height:1.6}
.divider{height:1px;background:var(--border);margin:24px 0}

/* ── ENABLER CARDS ── */
.en-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:14px}
.en-card{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:18px 20px;transition:border-color .15s}
.en-card.en-done{border-color:rgba(74,222,128,.25);opacity:.7}
.en-card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.en-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.en-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:4px}
.en-desc{font-size:12px;color:var(--muted);line-height:1.55}
.en-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;gap:8px}
.en-resp{display:flex;flex-wrap:wrap;gap:4px}
.en-chip{font-size:11px;padding:2px 8px;background:var(--tag-bg);border:1px solid var(--border);border-radius:100px;color:var(--text)}
.en-actions{display:flex;gap:6px;flex-shrink:0}
.en-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:4px 10px;border-radius:4px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);transition:all .12s}
.en-btn:hover{background:var(--tag-bg);color:var(--text)}
.en-btn.ok{color:var(--ok);border-color:rgba(74,222,128,.3)}
.en-btn.ok.on,.en-btn.ok:hover{background:rgba(74,222,128,.1)}
.en-btn.danger:hover{color:var(--a4);border-color:rgba(255,124,91,.3)}
.en-steps{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.en-step-row{display:flex;gap:10px;align-items:flex-start;padding:6px 0;cursor:pointer}
.en-step-row:not(:last-child){border-bottom:1px solid rgba(37,38,40,.7)}
.en-snum{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:20px;flex-shrink:0;padding-top:2px;user-select:none}
.en-stext{font-size:12px;color:var(--muted);line-height:1.5;flex:1}
.en-step-row.sdone .en-snum{color:var(--ok)}
.en-step-row.sdone .en-stext{text-decoration:line-through;opacity:.4}
.en-scheck{font-size:12px;flex-shrink:0;padding-top:1px;color:var(--border);transition:color .12s}
.en-step-row:hover .en-scheck{color:var(--muted)}
.en-step-row.sdone .en-scheck{color:var(--ok)}
.icon-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.icon-opt{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:16px;transition:all .12s;background:var(--bg)}
.icon-opt:hover{border-color:var(--muted)}.icon-opt.sel{border-color:var(--a5);background:rgba(192,132,252,.1)}
.en-edit-step{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:11px;margin-bottom:8px}
.en-edit-step-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}

/* ── SAVE INDICATOR ── */
.si{position:fixed;bottom:16px;right:20px;font-family:'DM Mono',monospace;font-size:10px;padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:100px;color:var(--ok);opacity:0;transition:opacity .3s;pointer-events:none;z-index:50}
.si.show{opacity:1}

/* ── OVERVIEW TABS ── */
.ov-tabs{display:flex;gap:2px;margin-top:20px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:3px;width:fit-content}
.ov-tab{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:5px 14px;border-radius:5px;cursor:pointer;color:var(--muted);transition:all .15s;user-select:none}
.ov-tab.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.3)}

/* ── PROGRESS TABLE ── */
.pt-wrap{padding:20px 40px 60px}
.pt-table{width:100%;border-collapse:collapse}
.pt-table th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:0 14px 10px;text-align:left;white-space:nowrap;font-weight:400}
.pt-table th:first-child{padding-left:0}
.pt-row{border-top:1px solid var(--border);cursor:pointer;transition:background .12s}
.pt-row:hover td{background:rgba(255,255,255,.02)}
.pt-row.done-row td{opacity:.55}
.pt-table td{padding:13px 14px;vertical-align:middle}

.pt-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pt-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.pt-area{font-size:11px;color:var(--muted);margin-top:2px}
.pt-resp{display:flex;flex-wrap:wrap;gap:4px}
.pt-chip{font-size:11px;padding:2px 8px;background:var(--tag-bg);border:1px solid var(--border);border-radius:100px;color:var(--text);white-space:nowrap}
.pt-deadline{font-size:12px;font-weight:500;white-space:nowrap}
.pt-no-dl{font-size:12px;color:var(--muted)}
.pt-prog-wrap{display:flex;flex-direction:column;gap:5px;min-width:120px}
.pt-prog-row{display:flex;align-items:center;gap:7px}
.pt-prog-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);width:42px;flex-shrink:0}
.pt-bar{flex:1;height:5px;background:var(--border);border-radius:10px;overflow:hidden}
.pt-bar-fill{height:100%;border-radius:10px;transition:width .4s}
.pt-pct{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);width:28px;text-align:right;flex-shrink:0}
.pt-status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;white-space:nowrap}
.pt-status.st-done{color:var(--ok);background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25)}
.pt-status.st-wip{color:var(--accent);background:rgba(240,192,64,.08);border:1px solid rgba(240,192,64,.2)}
.pt-status.st-idle{color:var(--muted);background:var(--tag-bg);border:1px solid var(--border)}
.pt-status.st-over{color:var(--a4);background:rgba(255,124,91,.08);border:1px solid rgba(255,124,91,.2)}

/* ── LOADING ── */
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;flex-direction:column;gap:12px}
.spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--muted);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

/* ── LOGIN ── */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
.login-box{width:340px;padding:36px 32px;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;gap:0}
.login-logo{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}
.login-title{font-size:20px;font-weight:700;margin-bottom:28px;line-height:1.2}
.login-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
.login-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s;margin-bottom:14px;letter-spacing:.08em}
.login-input:focus{border-color:var(--muted)}
.login-btn{width:100%;background:var(--text);color:var(--bg);border:none;border-radius:6px;padding:11px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:opacity .15s;font-weight:500}
.login-btn:hover{opacity:.88}
.login-err{font-size:12px;color:var(--a4);margin-top:10px;text-align:center;min-height:18px;font-family:'DM Mono',monospace}
.login-shake{animation:shake .35s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
</style>

function shortName(full) {
  const parts = full.trim().split(' ');
  if (parts.length === 1) return parts[0];
  return parts[0] + ' ' + parts[parts.length-1];
}

function tagType(l) {
  l = l.toLowerCase();
  if (/gpt|claude|whisper|firefly|dall|midjourney|gemini|openai|llm/.test(l)) return 'ai';
  if (/\bapi\b|webhook|rest\b|endpoint|sdk/.test(l)) return 'api';
  if (/⚠|obrigatório|lgpd|revisão humana/.test(l)) return 'warn';
  return 'tool';
}

function fmtDate(d) {
  if (!d) return null;
  const dt = new Date(d+'T12:00:00'), now = new Date();
  const diff = (dt - now) / 86400000;
  const str = dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
  return {str, cls: diff < 0 ? 'dl-over' : diff <= 7 ? 'dl-soon' : ''};
}

function stepPct(steps) {
  if (!steps.length) return 0;
  return Math.round(steps.filter(s=>s.done).length / steps.length * 100);
}
function critPct(criteria) {
  if (!criteria||!criteria.length) return 0;
  return Math.round(criteria.filter(c=>c.done).length / criteria.length * 100);
}
